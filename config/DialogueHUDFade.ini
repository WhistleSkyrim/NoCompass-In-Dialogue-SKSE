[General]
bEnabled=true
bFadeOnDialogue=true
bRestoreOnDialogueEnd=true
bDebugLogging=false

[Animation]
fFadeOutSeconds=0.20
fFadeInSeconds=0.20
fHiddenAlpha=0.0
fVisibleAlpha=100.0
sEasing=smoothstep

[Compatibility]
bRespectExternalHudChanges=true
bRestoreOnlyIfChangedByPlugin=true
bRetryIfHUDMenuMissing=true
; Restore HUD and stop fading when inventory/map/journal/etc. opens.
bDisableInMenus=true

[Targets]
; FullHUD is default. Optional future values: CompassOnly, CustomPaths.
sTargetMode=FullHUD

; Optional fallback Scaleform paths. Missing paths are ignored safely.
sFullHUDPaths=_root.HUDMovieBaseInstance,_root
